name: CI – Lint · Test · Train

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting deps
        run: pip install flake8 flake8-bugbear

      - name: Run flake8
        run: |
          flake8 . \
            --exclude=.venv,mlruns,artifacts,__pycache__ \
            --max-line-length=120 \
            --extend-ignore=E203,W503,E501

  # ── 2. Unit Tests ────────────���────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install all dependencies
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=. \
            --cov-omit="tests/*,.venv/*,mlruns/*" \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # ── 3. Model Training ─────────────────────────────────────────────────────
  train:
    name: Model Training (MLflow)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install all dependencies
        run: pip install -r requirements.txt

      - name: Train models
        run: python -u modelDevelopment.py
        env:
          PYTHONWARNINGS: ignore

      - name: Upload trained model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-artifacts
          path: artifacts/
          retention-days: 30

      - name: Upload MLflow runs
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 30

      - name: Show artifact contents
        run: ls -lh artifacts/

